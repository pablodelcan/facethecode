<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=VT323&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<title>ASCII Face</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
  }

  #stage {
    position: relative;
    display: inline-block;
    max-height: 90vh;
  }

  #photo {
    display: block;
    max-height: 90vh;
    max-width: 90vw;
    object-fit: contain;
  }

  #face-overlay {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 36%;
    aspect-ratio: 1 / 1.35;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #face-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 70%;
    background: radial-gradient(ellipse at center, rgba(180,210,255,0.07) 0%, transparent 70%);
    animation: glow-radial 3s ease-in-out infinite;
    pointer-events: none;
    border-radius: 50%;
  }

  @keyframes glow-radial {
    0%   { opacity: 0.6; transform: translate(-50%, -50%) scale(1.0); }
    50%  { opacity: 1.0; transform: translate(-50%, -50%) scale(1.15); }
    100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.0); }
  }

  #ascii-face {
    display: none;
  }

  #face-canvas {
    position: relative;
    z-index: 2;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    animation: glow-pulse-canvas 3s ease-in-out infinite;
    user-select: none;
    width: 90%;
    height: auto;
  }

  @keyframes glow-pulse-canvas {
    0%   { filter: drop-shadow(0 0 3px rgba(255,255,255,0.7)) drop-shadow(0 0 7px rgba(255,255,255,0.15)); }
    50%  { filter: drop-shadow(0 0 5px rgba(255,255,255,0.9)) drop-shadow(0 0 12px rgba(255,255,255,0.25)); }
    100% { filter: drop-shadow(0 0 3px rgba(255,255,255,0.7)) drop-shadow(0 0 7px rgba(255,255,255,0.15)); }
  }

  #pw-canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    animation: glow-pulse-canvas 3s ease-in-out infinite;
    width: clamp(200px, 40vw, 400px);
    height: auto;
  }

  @keyframes glow-pulse {
    0%   { text-shadow: 0 0 3px rgba(255,255,255,0.7), 0 0 7px rgba(255,255,255,0.15); }
    50%  { text-shadow: 0 0 5px rgba(255,255,255,0.9), 0 0 12px rgba(255,255,255,0.25); }
    100% { text-shadow: 0 0 3px rgba(255,255,255,0.7), 0 0 7px rgba(255,255,255,0.15); }
  }

  /* HUD */
  #hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }

  .key-hint {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #aaa;
    letter-spacing: 0.02em;
  }
  .key-hint span {
    color: #fff;
    font-weight: bold;
  }

  #expr-label {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #555;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #num-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 8px;
  }

  .num-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, text-shadow 0.15s;
    letter-spacing: 0.02em;
  }
  .num-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.6);
    text-shadow: 0 0 8px #fff;
  }
  .num-btn:active {
    background: rgba(255,255,255,0.25);
  }

  #key-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── Password Screen ─────────────────────────────────── */
  #password-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 28px;
  }

  #password-screen pre {
    display: none;
  }

  #pw-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #pw-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-align: center;
    width: 220px;
    padding: 8px 0;
    outline: none;
    caret-color: #fff;
  }
  #pw-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }

  #pw-error {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    height: 16px;
    text-transform: uppercase;
  }

  #pw-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Controls Panel ──────────────────────────────────── */
  #ctrl-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 900;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    color: #888;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  #ctrl-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }

  #controls {
    position: fixed;
    top: 42px;
    right: 12px;
    z-index: 900;
    background: rgba(0,0,0,0.88);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 14px 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    min-width: 230px;
    backdrop-filter: blur(8px);
  }
  #controls.open { display: flex; }

  .ctrl-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .ctrl-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ctrl-val { color: #fff; }
  .ctrl-row input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .ctrl-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }
  .ctrl-row input[type="range"]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="password-screen">
  <pre id="pw-face">  ^^      ^^

  (^)     (^)

        /
       /_

    &lt;**//**&gt;      </pre>
  <canvas id="pw-canvas"></canvas>
  <div id="pw-form">
    <div id="pw-label">access code</div>
    <input id="pw-input" type="password" placeholder="_ _ _ _ _ _ _" autocomplete="off" autofocus />
    <div id="pw-error"></div>
  </div>
</div>

<button id="ctrl-toggle">[+]</button>
<div id="controls">
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Size</span><span class="ctrl-val" id="cv-size">36</span></div>
    <input type="range" id="cr-size" min="15" max="60" value="36" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Y pos</span><span class="ctrl-val" id="cv-ypos">20</span></div>
    <input type="range" id="cr-ypos" min="0" max="60" value="20" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>X pos</span><span class="ctrl-val" id="cv-xpos">50</span></div>
    <input type="range" id="cr-xpos" min="20" max="80" value="50" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Boldness</span><span class="ctrl-val" id="cv-bold">700</span></div>
    <input type="range" id="cr-bold" min="100" max="900" value="700" step="100">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Line height</span><span class="ctrl-val" id="cv-lh">1.5</span></div>
    <input type="range" id="cr-lh" min="1.0" max="2.5" value="1.5" step="0.1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Glow</span><span class="ctrl-val" id="cv-glow">100</span></div>
    <input type="range" id="cr-glow" min="0" max="200" value="100" step="10">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Eyes X</span><span class="ctrl-val" id="cv-eyex">0</span></div>
    <input type="range" id="cr-eyex" min="-10" max="10" value="0" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Eyes Y</span><span class="ctrl-val" id="cv-eyey">0</span></div>
    <input type="range" id="cr-eyey" min="-10" max="10" value="0" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Nose X</span><span class="ctrl-val" id="cv-nosex">0</span></div>
    <input type="range" id="cr-nosex" min="-10" max="10" value="0" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Nose Y</span><span class="ctrl-val" id="cv-nosey">0</span></div>
    <input type="range" id="cr-nosey" min="-10" max="10" value="0" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Mouth X</span><span class="ctrl-val" id="cv-mouthx">0</span></div>
    <input type="range" id="cr-mouthx" min="-10" max="10" value="0" step="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label"><span>Mouth Y</span><span class="ctrl-val" id="cv-mouthy">0</span></div>
    <input type="range" id="cr-mouthy" min="-10" max="10" value="0" step="1">
  </div>
</div>

<div id="expr-label"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// 18-char fixed grid.
// ═══════════════════════════════════════════════════════════════

const B0 = "   __      __     ";
const A0 = "  /  \\    /  \\    ";
const P0 = "  (@)     (@)     ";
const N0 = "        /\n       /_";
const GLYPHS = "/<>\\|_-*().!=?^~+";

const M = [
  "    <**//**>      ",  // 0 original
  "   \\________/     ",  // 1 smile
  "     /---\\        ",  // 2 frown
  "     /___\\        ",  // 3 sad
  "      -----       ",  // 4 flat
  "      >---<       ",  // 5 angry
  "       ( )        ",  // 6 open
  "  <//===<//>      ",  // 7 glitch
  "      ___//       ",  // 8 smirk
];

const EYES = [
  ["  ^^      ^^      ", "                  ", "  (^)     (^)     "],
  ["   __      __     ", "  ---     ---     ", "   -       -      "],
  ["  \\__      __/    ", A0, P0],
  [B0, A0, "  (o)     (o)     "],
  ["  __        __    ", " /   \\    /   \\   ", P0],
  [B0, A0, "  (*)     (*)     "],
  ["   --       --    ", " /   \\    /   \\   ", "  (o)     (o)     "],
  ["    _\\      /_    ", A0, P0],
  [B0, A0, P0],
  [B0, A0, "  (X)     (X)     "],
];

const E = [
  { name:"0 DEFAULT",   brow:"  ^^      ^^      ",   arc:"                  ",   pupil:"  (^)     (^)     ",   mouth:M[0] },
  { name:"1 WINK",      brow:B0,                   arc:A0,                    pupil:P0,                   mouth:M[1] },
  { name:"2 SMILE",     brow:B0,                   arc:A0,                    pupil:P0,                   mouth:M[1] },
  { name:"3 FROWN",     brow:B0,                   arc:A0,                    pupil:P0,                   mouth:M[2] },
  { name:"4 SAD",       brow:"    _\\      /_     ", arc:A0,                    pupil:P0,                   mouth:M[3] },
  { name:"5 EXCITED",   brow:"  __        __     ", arc:" /   \\    /   \\    ", pupil:P0,                   mouth:M[0] },
  { name:"6 SWEAT",     brow:B0,                   arc:A0,                    pupil:"  (@).    (@)     ",  mouth:M[4] },
  { name:"7 ANGRY",     brow:"  \\__      __/     ", arc:A0,                    pupil:P0,                   mouth:M[5] },
  { name:"8 SURPRISED", brow:"   --       --    ",  arc:" /   \\    /   \\   ",  pupil:"  (o)     (o)     ", mouth:M[6] },
  { name:"9 DEAD",      brow:"                  ",  arc:A0,                    pupil:"  (X)     (X)     ", mouth:M[4] },
];

const PRESETS = [
  { name:"DEFAULT",   ei:0, mi:0 },
  { name:"GLITCH",    ei:1, mi:7 },
  { name:"WIRED",     ei:5, mi:0 },
  { name:"CURIOUS",   ei:3, mi:8 },
  { name:"MENACING",  ei:2, mi:5 },
  { name:"ZEN",       ei:1, mi:4 },
  { name:"SURPRISED", ei:6, mi:6 },
  { name:"SMUG",      ei:8, mi:8 },
  { name:"DEAD",      ei:9, mi:4 },
  { name:"RAGE",      ei:2, mi:5 },
];

let state = { ei:0, mi:0, pi:0 };
let animating = false;

// ── Audio ─────────────────────────────────────────────────────────────────────
// AudioContext created ONLY after first user gesture — fixes autoplay block
let _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

function tone(freq, type, dur, vol, detune) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (detune) o.detune.setValueAtTime(detune, ctx.currentTime);
    g.gain.setValueAtTime(vol || 0.07, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur + 0.01);
  } catch(e) {}
}
const beep = tone;
const playSweepUp = () => playSweep();

function playClick()     { beep(880, 'square', 0.05, 0.12); beep(1320, 'sine', 0.03, 0.06); }
function playAction()    { beep(440, 'sawtooth', 0.15, 0.14); setTimeout(()=>beep(660,'square',0.1,0.12), 40); setTimeout(()=>beep(880,'sine',0.06,0.06), 80); }
function playScramble()  { beep(220, 'sawtooth', 0.08, 0.12, 200); beep(330, 'square', 0.05, 0.06, -100); }
function playGlitch()    {
  [0,30,60,90,120].forEach(t => setTimeout(()=>beep(110+Math.random()*440,'sawtooth',0.06,0.10), t));
  setTimeout(()=>beep(80,'square',0.1,0.08), 60);
}
function playChime()     {
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>{ beep(f,'sine',0.22,0.12); beep(f*2,'sine',0.15,0.04); }, i*70));
}
function playAlarm()     {
  [880,440,880,440,660].forEach((f,i) => setTimeout(()=>beep(f,'square',0.12,0.14), i*75));
}
function playLow()       { beep(110, 'sawtooth', 0.25, 0.15); beep(55, 'sine', 0.3, 0.08); }
function playSweep() {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const vol = ctx.createGain();
    const vol2 = ctx.createGain();
    osc.connect(vol); vol.connect(ctx.destination);
    osc2.connect(vol2); vol2.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.3);
    vol.gain.setValueAtTime(0.14, ctx.currentTime);
    vol.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(160, ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(2400, ctx.currentTime + 0.3);
    vol2.gain.setValueAtTime(0.06, ctx.currentTime);
    vol2.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}
function playDescend() {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const vol = ctx.createGain();
    osc.connect(vol); vol.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.4);

}

const CHAR_W = 6; // 5px glyph + 1px gap
const CHAR_H_BASE = 8; // 7px glyph + 1px gap

function renderPixelCanvas(canvas, text) {
  const lines = text.split('\n');
  const lhm = (typeof lineHeightMul !== 'undefined') ? lineHeightMul : 1.5;
  const cellH = Math.round(CHAR_H_BASE * lhm);
  const maxCols = Math.max(...lines.map(l => l.length));
  const pad = 20; // padding for negative offsets
  const w = maxCols * CHAR_W + pad * 2;
  const h = lines.length * cellH + pad * 2;

  canvas.width = w || 1;
  canvas.height = h || 1;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(w, h);
  const px = img.data;

  const yOff = Math.floor((cellH - 7) / 2); // vertically center glyph in cell

  // Per-section pixel offsets: lines 0-2=eyes, 4-5=nose, 7=mouth
  function sectionOfs(li) {
    if (li <= 2) return { x: eyeOfsX, y: eyeOfsY };
    if (li === 4 || li === 5) return { x: noseOfsX, y: noseOfsY };
    if (li >= 7) return { x: mouthOfsX, y: mouthOfsY };
    return { x: 0, y: 0 };
  }

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const ofs = sectionOfs(li);
    for (let ci = 0; ci < line.length; ci++) {
      const glyph = _F[line[ci]];
      if (!glyph) continue;
      const ox = ci * CHAR_W + pad + ofs.x;
      const oy = li * cellH + yOff + pad + ofs.y;
      for (let row = 0; row < 7; row++) {
        const bits = glyph[row];
        if (!bits) continue;
        for (let col = 0; col < 5; col++) {
          if (bits & (16 >> col)) {
            const px_x = ox + col;
            const px_y = oy + row;
            if (px_x >= 0 && px_x < w && px_y >= 0 && px_y < h) {
              const i = (px_y * w + px_x) * 4;
              px[i] = px[i+1] = px[i+2] = px[i+3] = 255;
            }
          }
        }
      }
    }
  }
  ctx.putImageData(img, 0, 0);
}

// ── Scramble ──────────────────────────────────────────────────────────────────
function scrambleTo(target, onDone) {
  if (animating) return;
  animating = true;
  const el = document.getElementById("ascii-face");
  const from = el.textContent.padEnd(target.length, " ");
  const len  = target.length;
  const delays = Array.from({length:len}, (_,i) => {
    if (from[i]===target[i]||target[i]==="\n") return 0;
    if (target[i]===" "&&from[i]===" ") return 0;
    return Math.floor(Math.random()*8)+2;
  });
  const maxD = Math.max(...delays, 1);
  let frame = 0;
  const iv = setInterval(() => {
    frame++;
    let out = "";
    for (let i=0;i<len;i++) {
      if (target[i]==="\n") { out+="\n"; continue; }
      if (frame>=delays[i]||delays[i]===0) out+=target[i];
      else out+=(target[i]===" "&&from[i]===" ")?" ":GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
    }
    el.textContent = out;
    if (frame>=maxD+2) {
      el.textContent = target;
      clearInterval(iv);
      animating = false;
      if (onDone) onDone();
    }
  }, 38);
}

function resetIdle() {
  clearTimeout(idleTimer);
  clearInterval(idleIv);
  idleSpeed = 6000;

  doIdleStep();

  idleSpeed = Math.max(IDLE_MIN, idleSpeed * IDLE_ACCEL);
  idleIv = setTimeout(() => { doIdleStep(); scheduleNextIdle(); }, idleSpeed);
}

function doIdleStep() {
  if (animating) return;
  const roll = Math.random();
  if (roll < 0.4)      { state.ei=(state.ei+1)%EYES.length; playScramble(); scrambleTo(presetFace(state)); }
  else if (roll < 0.7) { state.mi=(state.mi+1)%M.length;    playScramble(); scrambleTo(presetFace(state)); }
  else                 { state.pi=(state.pi+1)%PRESETS.length; const p=PRESETS[state.pi]; state.ei=p.ei; state.mi=p.mi; playScramble(); scrambleTo(presetFace(state)); }
}

const NOISE_CHARS = '!@#$%^&*<>/\\|_-+=?~`;:.,()[]{}\'\"';

// Build a "corrupted" line of given length — more corruption at higher stress
function corruptLine(base, stress, forceLen) {
  const len = forceLen || 18;
  const s = (base || '').padEnd(len, ' ').slice(0, len);
  let out = '';
  for (let i = 0; i < len; i++) {
    const corruptChance = Math.min(0.9, stress * 0.07);
    if (Math.random() < corruptChance && s[i] !== '\n') {
      out += NOISE_CHARS[Math.floor(Math.random() * NOISE_CHARS.length)];
    } else {
      out += s[i];
    }
  }
  return out;
}

// Build a totally noise-filled line
function noiseLine(len, density) {
  let out = '';
  for (let i = 0; i < len; i++) {
    out += Math.random() < density
      ? NOISE_CHARS[Math.floor(Math.random() * NOISE_CHARS.length)]
      : ' ';
  }
  return out;
}

function doX() {
  clearTimeout(stressResetTimer);

  // Allow interrupting animation for stress — always fires
  animating = false;

  stressLevel = Math.min(stressLevel + 1, STRESS_FACES.length);
  const idx = Math.min(stressLevel - 1, STRESS_FACES.length - 1);
  const sf = STRESS_FACES[idx]();

  setLabel(sf.label);
  playStress(stressLevel);

  const target = [sf.brow, sf.arc, sf.pupil, "", N0, "", sf.mouth].join("\n");

  // At very high stress, skip scramble and just slam the face in
  if (stressLevel >= 14) {
    setFaceInstant(target);
    animating = false;
  } else {
    scrambleTo(target);
  }

  // Reset timer — longer wait at higher stress (more dramatic recovery)
  const resetDelay = Math.min(STRESS_RESET_MS + stressLevel * 200, 7000);
  stressResetTimer = setTimeout(() => {
    stressLevel = 0;
    animating = false;
    scrambleTo(emotionFace(0), () => setLabel("0 DEFAULT"));
    playDescend();
  }, resetDelay);
}

  if (smirkLevel === 1) {
    playBoop();
    setLabel("SMIRK");
    const f = [
      defEyes[0], defEyes[1], defEyes[2],
      "", "        /", "       /_",
      "              *>  ",
      "    <**//         "
    ].join("\n");
    scrambleTo(f);
  } else {
    playChime();
    setLabel("SMILE");
    const f = [
      defEyes[0], defEyes[1], defEyes[2],
      "", "        /", "       /_",
      "  <*          *>  ",
      "     **//**       "
    ].join("\n");
    scrambleTo(f);
  }

  smirkResetTimer = setTimeout(() => {
    smirkLevel = 0;
    scrambleTo(emotionFace(0), () => setLabel("0 DEFAULT"));
  }, 2500);
}

// ── Special animations ────────────────────────────────────────────────────────
function doWink() {
  if (animating) return; playBoop(); setLabel("1 WINK");
  const winkFace = face("   __             ","  /  \\    -----   ","  (@)      --     ", M[1]);
  scrambleTo(winkFace, () => setTimeout(()=>scrambleTo(emotionFace(0),()=>setLabel("0 DEFAULT")), 700));
}
function doA() {
  if (animating) return; playAlarm(); setLabel("A ALERT");
  scrambleTo(face("    --       --   "," /   \\    /   \\   ","  (O)     (O)     ",M[6]),
    ()=>setTimeout(()=>scrambleTo(emotionFace(0),()=>setLabel("0 DEFAULT")),800));
}
function doS() {
  if (animating) return; playSweepUp(); setLabel("S SCAN");
  const frames = [
    face(B0,A0,"  (.)     (.)     ",M[0]),
    face(B0,A0,"   (@)     (@)    ",M[0]),
    face(B0,A0,"    (@)     (@)   ",M[0]),
    face(B0,A0,"   (@)     (@)    ",M[0]),
    face(B0,A0,P0,M[0]),
  ];
  animating = true; let i=0;
  const iv = setInterval(()=>{
    document.getElementById("ascii-face").textContent=frames[i]; i++;
    if(i>=frames.length){clearInterval(iv);animating=false;setLabel("0 DEFAULT");}
  },160);
}
function doD() {
  if (animating) return; playGlitch(); setLabel("D DIZZY");
  const spins=["@","*","o","O","@","*","o","@"]; let i=0;
  animating=true;
  const iv=setInterval(()=>{
    const s=spins[i%spins.length];
    document.getElementById("ascii-face").textContent=face(B0,A0,`  (${s})     (${s})     `,M[0]); i++;
    if(i>=spins.length){clearInterval(iv);document.getElementById("ascii-face").textContent=emotionFace(0);animating=false;setLabel("0 DEFAULT");}
  },100);
}
function doF() {
  if (animating) return; playStatic(); setLabel("F FLICKER");
  const orig=emotionFace(0); animating=true; let i=0;
  const iv=setInterval(()=>{
    if(i%2===0){let o="";for(const ch of orig){if(ch==="\n"){o+="\n";continue;}o+=Math.random()<0.4?GLYPHS[Math.floor(Math.random()*GLYPHS.length)]:ch;}document.getElementById("ascii-face").textContent=o;}
    else document.getElementById("ascii-face").textContent=orig;
    i++;
    if(i>=8){document.getElementById("ascii-face").textContent=orig;clearInterval(iv);animating=false;setLabel("0 DEFAULT");}
  },70);
}
function doG() {
  if (animating) return; playLow(); setLabel("G GLARE");
  scrambleTo(face("  \\__      __/   ",A0,P0,M[5]),
    ()=>setTimeout(()=>scrambleTo(emotionFace(0),()=>setLabel("0 DEFAULT")),900));
}
function doH() {
  if (animating) return; playChime(); setLabel("H HAPPY");
  scrambleTo(face(B0,A0,P0,"   \\________/     "),
    ()=>setTimeout(()=>scrambleTo(emotionFace(0),()=>setLabel("0 DEFAULT")),1000));
}
function doJ() {
  if (animating) return; playAlarm(); setLabel("J JAB");
  const orig=emotionFace(0);
  const left =face(B0," "+A0.slice(0,-1)," "+P0.slice(0,-1)," "+M[0].slice(0,-1));
  const right=face(B0,A0.slice(1)+" ",P0.slice(1)+" ",M[0].slice(1)+" ");
  animating=true; const seq=[left,right,left,right,left,orig]; let i=0;
  const iv=setInterval(()=>{document.getElementById("ascii-face").textContent=seq[i];i++;
    if(i>=seq.length){clearInterval(iv);animating=false;setLabel("0 DEFAULT");}},80);
}
function doK() {
  if (animating) return; playSweepUp(); setLabel("K KABOOM");
  const frames=[
    face(B0,A0,"  (o)     (o)     ",M[0]),
    face(B0,A0,"  (O)     (O)     ",M[6]),
    face(" __          __   ","/    \\    /    \\  "," (O)      (O)    ",M[6]),
    face("__            __  ","/     \\  /     \\ "," (O)      (O)    ",M[6]),
    face(B0,A0,P0,M[0]),
  ];
  animating=true; let i=0;
  const iv=setInterval(()=>{document.getElementById("ascii-face").textContent=frames[i];i++;
    if(i>=frames.length){clearInterval(iv);animating=false;setLabel("0 DEFAULT");}},130);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function goEmotion(n) {
  if (n===1){doWink();return;}
  if (animating) return;
  playAction(); setLabel(E[n].name); scrambleTo(emotionFace(n));
}
function cycleEyes()  { if(animating)return; playClick(); state.ei=(state.ei+1)%EYES.length; scrambleTo(presetFace(state)); }
function cycleMouth() { if(animating)return; playClick(); state.mi=(state.mi+1)%M.length;    scrambleTo(presetFace(state)); }
function applyPreset() {
  const p=PRESETS[state.pi]; state.ei=p.ei; state.mi=p.mi;
  setLabel(p.name); playAction(); scrambleTo(presetFace(state));
}
function nextPreset() { if(animating)return; state.pi=(state.pi+1)%PRESETS.length; applyPreset(); }
function prevPreset() { if(animating)return; state.pi=(state.pi-1+PRESETS.length)%PRESETS.length; applyPreset(); }
function randomFace() {
  if(animating)return; playSweepUp();
  state.ei=Math.floor(Math.random()*EYES.length);
  state.mi=Math.floor(Math.random()*M.length);
  setLabel("RANDOM"); scrambleTo(presetFace(state));
}

// ── Key handler ───────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  startAmbient();
  resetIdle();
  if (e.key>="0"&&e.key<="9"){goEmotion(parseInt(e.key));return;}
  switch(e.key.toLowerCase()) {
    case "x": doX(); break;
    case "a": doA(); break;
    case "s": doS(); break;
    case "d": doD(); break;
    case "f": doF(); break;
    case "g": doG(); break;
    case "h": doH(); break;
    case "j": doJ(); break;
    case "k": doK(); break;
    case "e": cycleEyes();  break;
    case "m": cycleMouth(); break;
    case " ": nextPreset(); e.preventDefault(); break;
    case "arrowup":    doUpSmirk(); break;
    case "arrowright": nextPreset(); break;
    case "arrowleft":  prevPreset(); break;
    case "r": randomFace(); break;
  }
});

document.querySelectorAll(".num-btn").forEach(btn => {
  btn.addEventListener("click", () => { startAmbient(); resetIdle(); goEmotion(parseInt(btn.dataset.n)); });
  btn.addEventListener("mouseenter", () => { beep(1200 + parseInt(btn.dataset.n)*80, 'sine', 0.02, 0.05); });
});

// ── Password gate ─────────────────────────────────────────────
(function() {
  const screen = document.getElementById('password-screen');
  const input  = document.getElementById('pw-input');
  const error  = document.getElementById('pw-error');
  const pwFace = document.getElementById('pw-face');

  const CORRECT = 'chatbot';
  const GLYPHS  = '/<>\\|_-*().!=?^~+@#';

  // Animate the lock face glow on the password screen
  let glitchIv = null;
  const lockFace = [
    "  ^^      ^^      ",
    "                  ",
    "  (^)     (^)     ",
    "        ",
    "        /",
    "       /_",
    "        ",
    "    <**//**>      "
  ].join('\n');

  function scrambleLockFace(target) {
    const from = (pwFace.textContent || target).padEnd(target.length, ' ');
    const len = target.length;
    const delays = Array.from({length:len}, (_,i) => {
      if (from[i]===target[i]||target[i]==='\n') return 0;
      if (target[i]===' '&&from[i]===' ') return 0;
      return Math.floor(Math.random()*6)+1;
    });
    const maxD = Math.max(...delays, 1);
    let frame = 0;
    clearInterval(glitchIv);
    glitchIv = setInterval(() => {
      frame++;
      let out = '';
      for (let i=0; i<len; i++) {
        if (target[i]==='\n') { out+='\n'; continue; }
        if (frame>=delays[i]||delays[i]===0) out+=target[i];
        else out+=(target[i]===' '&&from[i]===' ')?' ':GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      }
      pwFace.textContent = out;
      if (frame>=maxD+2) { pwFace.textContent=target; clearInterval(glitchIv); }
    }, 45);
  }

  // Wrong face — X eyes
  const wrongFace = [
    "  ^^      ^^      ",
    "                  ",
    "  (X)     (X)     ",
    "        ",
    "        /",
    "       /_",
    "        ",
    "     >---<        "
  ].join('\n');

  // Correct face — smile
  const correctFace = [
    "  ^^      ^^      ",
    "                  ",
    "  (^)     (^)     ",
    "        ",
    "        /",
    "       /_",
    "        ",
    "   \\________/     "
  ].join('\n');

  function unlock() {
    scrambleLockFace(correctFace);
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [523,659,784,1047].forEach((f,i) => {
        setTimeout(() => {
          const o = ctx.createOscillator(), v = ctx.createGain();
          o.connect(v); v.connect(ctx.destination);
          o.type='sine'; o.frequency.value=f;
          v.gain.setValueAtTime(0.07, ctx.currentTime);
          v.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.25);
          o.start(); o.stop(ctx.currentTime+0.3);
        }, i*80);
      });
    } catch(e) {}
    setTimeout(() => {
      screen.style.transition = 'opacity 0.6s';
      screen.style.opacity = '0';
      setTimeout(() => { screen.style.display = 'none'; resetIdle(); }, 600);
    }, 700);
  }

  function deny() {
    scrambleLockFace(wrongFace);
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [220,180].forEach((f,i) => {
        setTimeout(() => {
          const o = ctx.createOscillator(), v = ctx.createGain();
          o.connect(v); v.connect(ctx.destination);
          o.type='square'; o.frequency.value=f;
          v.gain.setValueAtTime(0.07, ctx.currentTime);
          v.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.2);
          o.start(); o.stop(ctx.currentTime+0.25);
        }, i*120);
      });
    } catch(e) {}
    error.textContent = 'ACCESS DENIED';
    input.value = '';
    setTimeout(() => {
      error.textContent = '';
      scrambleLockFace(lockFace);
    }, 1200);
  }

  input.addEventListener('keydown', (e) => {
    startAmbient();
    if (e.key === 'Enter') {
      if (input.value === CORRECT) unlock();
      else deny();
    } else if (e.key.length === 1) {
      playKeyType();
    }
  });

  // stop all other keydown events while password screen is visible
  document.addEventListener('keydown', (e) => {
    if (screen.style.display !== 'none') {
      if (e.key !== 'Enter' && e.key !== 'Tab') e.stopImmediatePropagation();
    }
  }, true);
})();
